{{FrontSide}}

<hr id=answer>

<div id="sentence">{{Front}}</div>
<script>
    var el = document.getElementById("sentence");
    var words = el.textContent.split(/\s+/).filter(function(w) { return w.length > 0; });
    var processed = "";

    for (let i = 0; i < words.length; i++) {
        var clean = words[i].replace(/[.,\/#!?$%\^&\*;:{}=\-_`~()»«؟'"]/g, "").toLowerCase();
        var url = "https://translate.google.com/?sl=uk&tl=en&op=translate&text=" + encodeURIComponent(clean);
        processed += '<a href="' + url + '" class="word-link">' + words[i] + '</a> ';
    }

    el.innerHTML = processed.trim();
</script>

<div class="audio">{{Audio}}</div>

{{#Example}}
<div class="example">
    {{Example}}
    <div class="audio">{{AudioExample}}</div>
    {{#ExampleTranslated}}<div class="example-translated">{{ExampleTranslated}}</div>{{/ExampleTranslated}}
</div>
{{/Example}}
